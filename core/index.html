<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock EDA Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-800 mb-8 text-center">Stock EDA Tool</h1>

        <div id="auth-section" class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 id="auth-title" class="text-xl font-semibold mb-4 text-gray-700">Login / Register</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="username" type="text" placeholder="Username" class="border p-2 rounded">
                <input id="password" type="password" placeholder="Password" class="border p-2 rounded">
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="handleAuth('login')"
                    class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Login</button>
                <button onclick="handleAuth('register')"
                    class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Register</button>
                <button onclick="logout()" class="hidden bg-red-500 text-white px-4 py-2 rounded"
                    id="logout-btn">Logout</button>
            </div>
            <p id="auth-msg" class="mt-2 text-sm text-gray-600"></p>
        </div>

        <div id="analysis-section" class="hidden bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Run Stock Analysis</h2>
            <div class="flex gap-2">
                <input id="ticker" type="text" placeholder="Enter Ticker (e.g. AAPL)"
                    class="border p-2 rounded uppercase flex-grow">
                <button onclick="runAnalysis()"
                    class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700">Analyze</button>
            </div>

            <div id="results" class="mt-8 hidden border-t pt-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4" id="res-symbol"></h3>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <div class="p-4 bg-blue-50 rounded">
                        <p class="text-sm text-gray-500">Current Price</p>
                        <p class="text-xl font-bold" id="res-price"></p>
                    </div>
                    <div class="p-4 bg-green-50 rounded">
                        <p class="text-sm text-gray-500">1Y Return</p>
                        <p class="text-xl font-bold" id="res-1y"></p>
                    </div>
                    <div class="p-4 bg-orange-50 rounded">
                        <p class="text-sm text-gray-500">Market Cap</p>
                        <p class="text-xl font-bold" id="res-cap"></p>
                    </div>
                </div>
                <pre id="raw-json" class="mt-6 p-4 bg-gray-900 text-green-400 rounded text-xs overflow-x-auto"></pre>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000/api";
        let authToken = localStorage.getItem('token');

        // Check login state on load
        if (authToken) showDashboard();

        async function handleAuth(type) {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('auth-msg');

            try {
                const response = await fetch(`${API_BASE}/auth/${type}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('token', authToken);
                    msg.innerText = `${type.charAt(0).toUpperCase() + type.slice(1)} successful!`;
                    showDashboard();
                } else {
                    msg.innerText = `Error: ${JSON.stringify(data)}`;
                }
            } catch (err) {
                msg.innerText = "Connection failed. Is the Django server running?";
            }
        }

        function showDashboard() {
            document.getElementById('analysis-section').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('auth-title').innerText = "Account Active";
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        async function runAnalysis() {
            const ticker = document.getElementById('ticker').value.toUpperCase();
            const resultsDiv = document.getElementById('results');

            try {
                // IMPORTANT: We pass the Token in the Authorization header
                const response = await fetch(`${API_BASE}/eda/analyze/${ticker}/`, {
                    headers: {
                        'Authorization': `Token ${authToken}`
                    }
                });

                const data = await response.json();
                displayTable(data);

                if (response.ok) {
                    resultsDiv.classList.remove('hidden');
                    document.getElementById('res-symbol').innerText = `Analysis: ${data.symbol}`;
                    document.getElementById('res-price').innerText = `$${data.current_price}`;
                    document.getElementById('res-1y').innerText = `${data.returns_percentage['1_year']}%`;
                    document.getElementById('res-cap').innerText = data.market_capitalization.category;
                    document.getElementById('raw-json').innerText = JSON.stringify(data, null, 2);
                } else {
                    alert("Analysis failed: " + (data.error || "Unknown error"));
                }
            } catch (err) {
                alert("Error connecting to EDA API.");
            }
        }
        function displayTable(data) {
            const resultsDiv = document.getElementById('results');
            console.log("Received data for table display:", data);
            // Create the HTML structure for the table
            const tableHTML = `
        <div class="overflow-x-auto mt-6">
            <table class="min-w-full bg-white border border-gray-200 shadow-sm rounded-lg">
                <thead>
                    <tr class="bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                        <th class="px-6 py-3 border-b">Metric</th>
                        <th class="px-6 py-3 border-b">Value / Details</th>
                    </tr>
                </thead>
                <tbody class="text-gray-700 text-sm">
                    <tr>
                        <td class="px-6 py-4 border-b font-medium">Stock Symbol</td>
                        <td class="px-6 py-4 border-b">${data.symbol}</td>
                    </tr>
                    <tr class="bg-gray-50">
                        <td class="px-6 py-4 border-b font-medium">Current Price</td>
                        <td class="px-6 py-4 border-b text-blue-600 font-bold">$${data.current_price}</td>
                    </tr>
                    <tr>
                        <td class="px-6 py-4 border-b font-medium">Market Cap</td>
                        <td class="px-6 py-4 border-b">${data.market_capitalization.category} ($${data.market_capitalization.value.toLocaleString()})</td>
                    </tr>
                    <tr class="bg-gray-50">
                        <td class="px-6 py-4 border-b font-medium">1-Year Return</td>
                        <td class="px-6 py-4 border-b ${data.returns_percentage['1_year'] >= 0 ? 'text-green-600' : 'text-red-600'} font-bold">
                            ${data.returns_percentage['1_year']}%
                        </td>
                    </tr>
                    <tr>
                        <td class="px-6 py-4 border-b font-medium">30-Day Volatility</td>
                        <td class="px-6 py-4 border-b">${data.volatility_30d_percentage}%</td>
                    </tr>
                    <tr class="bg-gray-50">
                        <td class="px-6 py-4 border-b font-medium">Max Drawdown</td>
                        <td class="px-6 py-4 border-b text-red-500">
                            ${data.maximum_drawdown.percentage}% (on ${data.maximum_drawdown.date})
                        </td>
                    </tr>
                    <tr>
                        <td class="px-6 py-4 border-b font-medium">Daily Extremes</td>
                        <td class="px-6 py-4 border-b text-xs">
                            Best: <span class="text-green-600">+${data.daily_returns_percentage.best}%</span> | 
                            Worst: <span class="text-red-600">${data.daily_returns_percentage.worst}%</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    `;

            // Inject the table into your results container
            resultsDiv.innerHTML = `<h3 class="text-lg font-bold text-gray-800 mb-2">Analysis for ${data.symbol}</h3>` + tableHTML;
            resultsDiv.classList.remove('hidden');
        }

    </script>
</body>

</html>
