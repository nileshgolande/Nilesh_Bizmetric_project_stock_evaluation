server {
    listen 80;
    server_name 20.244.27.178;

    # Frontend Static Files
    location / {
        root /home/azureuser/Nilesh_Bizmetric_project_stock_evaluation/frontend/stock-frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static Files (for Admin)
    location /static/ {
        alias /home/azureuser/Nilesh_Bizmetric_project_stock_evaluation/staticfiles/;
    }
}
